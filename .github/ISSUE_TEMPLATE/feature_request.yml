name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Share what you would like to see and why it matters. Clear use cases help us prioritize.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what is missing today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you imagine this working (UX, API, behavior).
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, or workarounds you use now.
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope / packages
      description: If relevant, mention areas of the monorepo (e.g. `apps/web`, `server`).
    validations:
      required: false
