name: Bug report
description: Report unexpected behavior or a regression
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in what you can; the more detail, the faster we can reproduce and fix it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the problem.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps that consistently trigger the issue.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead (errors, UI state, etc.).
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, app version or commit, and anything else relevant.
      placeholder: |
        - Browser / version:
        - OS:
        - chess-d version or commit:
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Screenshots / logs / extra context
      description: Optional attachments, stack traces, or network errors.
    validations:
      required: false
